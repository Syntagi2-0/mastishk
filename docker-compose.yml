services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: syntagi_lite
      POSTGRES_USER: syntagi
      POSTGRES_PASSWORD: syntagi_local_password
    ports:
      - "5432:5432"
    volumes:
      - syntagi_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U syntagi -d syntagi_lite"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_URL: jdbc:postgresql://postgres:5432/syntagi_lite
      DB_USERNAME: syntagi
      DB_PASSWORD: syntagi_local_password
      JWT_SECRET: local-docker-secret-change-me-at-least-32-bytes
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  syntagi_postgres_data:
