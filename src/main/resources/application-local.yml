spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/syntagi_lite}
    username: ${DB_USERNAME:syntagi}
    password: ${DB_PASSWORD:syntagi_local_password}

syntagi:
  security:
    jwt:
      secret: ${JWT_SECRET:local-development-secret-change-me-32-bytes-minimum}

logging:
  level:
    com.syntagi: DEBUG
