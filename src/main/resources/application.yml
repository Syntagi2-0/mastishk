spring:
  application:
    name: syntagi-lite
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-migration-naming: true
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100

server:
  shutdown: graceful
  forward-headers-strategy: framework
  compression:
    enabled: true
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db

springdoc:
  swagger-ui:
    path: /swagger-ui.html

syntagi:
  queue:
    early-call-minutes: 0
    scheduler:
      cron: "0 * * * * *"
  security:
    jwt:
      access-token-ttl: 15m
      issuer: syntagi-lite
