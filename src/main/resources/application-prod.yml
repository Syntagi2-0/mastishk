spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:20}
      minimum-idle: ${DB_MIN_IDLE:5}
  jpa:
    properties:
      hibernate:
        generate_statistics: false

syntagi:
  security:
    jwt:
      secret: ${JWT_SECRET}

logging:
  level:
    root: WARN
    com.syntagi: INFO
